name: Update LOC Badge

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  loc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get install -y cloc jq

      - name: Run cloc
        run: |
          cloc . --exclude-dir=build,vcpkg,external --json --out=loc.json

      - name: Generate badge.json
        run: |
          TOTAL=$(jq '.SUM.code' loc.json)
          echo "{\"schemaVersion\":1,\"label\":\"LOC\",\"message\":\"$TOTAL\",\"color\":\"blue\"}" > badge.json

      # 👇 Push to separate branch
      - name: Push to badges branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      
          # Create clean orphan branch
          git checkout --orphan badges
      
          # Remove tracked files (ignore errors)
          git rm -rf . || true
      
          # Copy badge.json back (IMPORTANT)
          cp $GITHUB_WORKSPACE/badge.json .
      
          git add badge.json
          git commit -m "Update LOC badge" || echo "No changes"
          git push origin badges --force
