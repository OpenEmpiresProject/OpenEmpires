name: Update LOC Badge

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  loc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get install -y cloc jq

      - name: Run cloc
        run: |
          cloc . --exclude-dir=build,vcpkg,external --json --out=loc.json

      - name: Generate badge.json
        run: |
          TOTAL=$(jq '.SUM.code' loc.json)
          echo "{\"schemaVersion\":1,\"label\":\"LOC\",\"message\":\"$TOTAL\",\"color\":\"blue\"}" > badge.json

      - name: Push to badges branch
        run: |
          # Create clean temp dir
          mkdir badges_dir
          cp badge.json badges_dir/
      
          cd badges_dir
      
          git init
          git checkout -b badges

          git config user.name "github-actions"
          git config user.email "actions@github.com"
    
          git add badge.json
          git commit -m "Update LOC badge"
      
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin badges --force
